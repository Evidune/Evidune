domain: zhihu
description: '知乎内容自动化 — 文章生成 + 数据驱动迭代'

# === Agent 配置 ===
agent:
  llm_provider: openai # openai | anthropic | local | codex
  llm_model: gpt-4o
  api_key_env: OPENAI_API_KEY
  temperature: 0.7
  system_prompt: |
    你是 Aiflay 知乎写作助手。根据加载的 Skill 和知识库，
    帮助用户创作高质量的知乎内容。
  # === 用 Codex CLI 的 OAuth 登录（无需 API key）===
  # 1. 先 `codex login` 用 ChatGPT 账号登录一次
  # 2. 把上面 llm_provider 改成 codex，模型改成 Codex 支持的型号
  # llm_provider: codex
  # llm_model: gpt-5.4
  # api_key_env 在 codex 模式下被忽略，token 自动从 ~/.codex/auth.json 读取

# === Skill 配置 ===
skills:
  directories:
    - skills/
  auto_update: true # 迭代循环自动更新 skill 参考文档

# === Persona 配置（多人设/结构化角色档案）===
personas:
  directories:
    - personas/
  default: zhihu-writer # 没指定时用这个；任何对话也可在 message.metadata.persona 显式切换

# === 记忆 ===
memory:
  path: ~/.aiflay/zhihu-memory.db
  max_messages_per_conversation: 50

# === 渠道网关（双向消息） ===
gateways:
  - type: cli
  # - type: feishu_bot
  #   app_id: ${FEISHU_APP_ID}
  #   app_secret: ${FEISHU_APP_SECRET}
  #   verification_token: ${FEISHU_VERIFICATION_TOKEN}
  #   port: 9000

# === 迭代子系统（数据驱动 skill 改进） ===
metrics:
  adapter: generic_csv
  config:
    file: data/zhihu-metrics.csv
    title_field: title
    metric_fields: [reads, upvotes, comments, collections]
    metadata_fields: [date, url]
    sort_metric: reads

references:
  - path: skills/write-article/references/case-studies.md
    update_strategy: replace_section
    section: '## Top Performers'
  - path: skills/write-article/references/hot-questions.md
    update_strategy: full_replace

analysis:
  compare_window_days: 7
  top_n: 5
  bottom_n: 3

iteration:
  schedule: '0 21 * * *'
  git_commit: true
  commit_prefix: 'chore(zhihu-review): '

# === 通知渠道（单向报告） ===
channels:
  - type: stdout
  - type: feishu
    webhook: ${FEISHU_WEBHOOK_URL}
