domain: content
description: '长文内容自动化 — 文章生成 + 数据驱动迭代'

# === Agent 配置 ===
agent:
  llm_provider: openai # openai | anthropic | local | codex
  llm_model: gpt-4o
  api_key_env: OPENAI_API_KEY
  temperature: 0.7
  system_prompt: |
    你是 Evidune 长文写作助手。根据加载的 Skill 和知识库，
    帮助用户创作高质量的长文内容。
  # === 用 Codex CLI 的 OAuth 登录（无需 API key）===
  # 1. 先 `codex login` 用 ChatGPT 账号登录一次
  # 2. 把上面 llm_provider 改成 codex，模型改成 Codex 支持的型号
  # llm_provider: codex
  # llm_model: gpt-5.4
  # api_key_env 在 codex 模式下被忽略，token 自动从 ~/.codex/auth.json 读取

  # === 自动事实提取（内建能力；这里调节节奏和阈值）===
  fact_extraction:
    every_n_turns: 5 # 每 5 轮触发一次提取
    min_confidence: 0.7 # 低于此置信度的 fact 不入库
    use_evaluator: true # 优先用 evaluator LLM 做提取（避免主模型自我合理化）

  # === Skill 浮现（内建能力；这里调节检测频率和输出目录）===
  emergence:
    every_n_turns: 10 # 检测频率（比 fact_extraction 慢，因为生成成本更高）
    min_confidence: 0.7 # 低于此置信度不创建新 skill
    output_dir: .evidune/emerged_skills # 浮现 skill 落盘位置（相对 evidune.yaml）
    use_evaluator: true # 用 evaluator LLM 做检测/合成

# === Skill 配置 ===
skills:
  directories:
    - skills/
  auto_update: true # 迭代循环自动更新 skill 参考文档

# === Identity 配置（OpenClaw 风格多文件角色包）===
identities:
  directories:
    - identities/
  default: content-writer # 没指定时用这个；任何对话也可在 message.metadata.identity 显式切换

# === 记忆 ===
memory:
  path: .evidune/content-memory.db
  max_messages_per_conversation: 50

# === 渠道网关（双向消息） ===
gateways:
  - type: cli
  # - type: feishu_bot
  #   app_id: ${FEISHU_APP_ID}
  #   app_secret: ${FEISHU_APP_SECRET}
  #   verification_token: ${FEISHU_VERIFICATION_TOKEN}
  #   port: 9000

# === 迭代子系统（数据驱动 skill 改进） ===
metrics:
  adapter: generic_csv
  config:
    file: data/content-metrics.csv
    title_field: title
    metric_fields: [reads, upvotes, comments, collections]
    metadata_fields: [date, url]
    sort_metric: reads

references:
  - path: skills/write-article/references/case-studies.md
    update_strategy: replace_section
    section: '## Top Performers'
  - path: skills/write-article/references/hot-questions.md
    update_strategy: full_replace

analysis:
  compare_window_days: 7
  top_n: 5
  bottom_n: 3

iteration:
  schedule: '0 21 * * *'
  git_commit: false
  commit_prefix: 'chore(content-review): '

# === 通知渠道（单向报告） ===
channels:
  - type: stdout
  # - type: feishu
  #   webhook: ${FEISHU_WEBHOOK_URL}
